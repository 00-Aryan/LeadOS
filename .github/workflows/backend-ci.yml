name: Backend CI

on:
  push:
    branches: [main, phase-0-product-foundation]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: make install

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

      - name: Test
        run: make test
